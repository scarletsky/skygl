<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Hello CubeGeometry</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../styles.css" type="text/css" media="screen" />
    <script src="../../dist/skygl.js"></script>
  </head>
  <body>
    <script type="text/javascript">
     const device = new skygl.Device();
     const gl = device.gl;
     const vertexSource = `
        attribute vec3 POSITION;
        void main() {
          gl_Position = vec4(POSITION, 1.0);
        }
     `;
     const fragmentSource = `
         void main() {
           gl_FragColor = vec4(1.0, 0.0, 0.0, 1.0);
         }
     `;
     const shader = new skygl.Shader({ vertexSource, fragmentSource });
     const geometry = new skygl.CubeGeometry();
     device.draw({
       vertices: geometry.vertices,
       indices: geometry.indices,
       primitive: geometry.primitive,
       shader: shader
     });
     document.body.appendChild(device.canvas);
    </script>
  </body>
</html>
