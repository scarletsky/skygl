<!doctype html>
<html>
    <head>
        <title>Engine</title>
        <style>
            html, body { margin: 0; padding: 0; background: rgb(25, 25, 25); overflow: hidden; }
            canvas { width: 100vw; height: 100vh; }
        </style>
    </head>

    <body>
        <canvas id="application"></canvas>
        <script type="text/javascript" src="../dist/engine.js"></script>
        <script type="text/javascript">
var canvas = document.getElementById('application');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
engine.InputManager.add(new engine.Mouse(canvas));
engine.InputManager.add(new engine.Keyboard(window));
var device = new engine.Device(canvas);
var gl = device.gl;
var renderer = new engine.ForwardRenderer(device);
var scene = new engine.Scene();
var geometry = engine.Geometry.createBox();
var material = new engine.PhongMaterial();
var diffuseMap = new engine.Texture();
var specularMap = new engine.Texture();
var mesh = new engine.Mesh(geometry, material);
var mesh2 = new engine.Mesh(geometry, material);
var camera = new engine.Camera();
var orbitControls = new engine.OrbitControls();
camera.position.set(0, 0, 5);
camera.aspect = window.innerWidth / window.innerHeight;
camera.addScript(orbitControls);
mesh2.setWorldPosition(new engine.Vec3(2, 1, 0));
scene.addChild(mesh);
scene.addChild(mesh2);

var lightPosition = new engine.Vec3(1, 0, 5);
var lightColor = new engine.Color(1, 1, 1, 1);
device.scope.setValue('uLightPosition', lightPosition);
device.scope.setValue('uLightColor', lightColor);
var image = new Image();
var image2 = new Image();
image.onload = function() {
    image.loaded = true;
    diffuseMap.setSource(image);
    material.diffuseMap = diffuseMap;
    onImageLoaded();
};
image2.onload = function() {
    image2.loaded = true;
    specularMap.setSource(image2);
    material.specularMap = specularMap;
    onImageLoaded();
}
image.src = "./assets/container2.png";
image2.src = "./assets/container2_specular.png";
material.diffuse.set(1, 0.5, 0.5, 1);

function onImageLoaded() {
    if (image.loaded && image2.loaded) {
        render();
    }
}
            
function render() {
    device.scope.setValue("uLightPosition", camera.getWorldPosition());
    renderer.render(scene, camera);
    window.requestAnimationFrame(render);
}

        </script>
    </body>
</html>
