<!doctype html>
<html>
    <head>
        <title>Engine</title>
        <style>
            html, body { margin: 0; padding: 0; }
            canvas { width: 100vw; height: 100vh; }
        </style>
    </head>

    <body>
        <canvas id="application"></canvas>
        <script type="text/javascript" src="../dist/engine.js"></script>
        <script id="vshader" type="application/x-glsl">
attribute vec3 aPosition;
attribute vec3 aNormal;
attribute vec2 aUv;
varying vec4 vColor;
uniform mat4 modelMatrix;
uniform mat4 viewMatrix;
uniform mat4 projectionMatrix;
void main() {
    gl_Position = projectionMatrix * viewMatrix * modelMatrix * vec4(aPosition, 1.0);
}
        </script>
        <script id="fshader" type="application/x-glsl">
precision highp float;
void main() {
    gl_FragColor = vec4(1.0, 0.0, 0.0, 1.0);
}
        </script>
        <script type="text/javascript">
var canvas = document.getElementById('application');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
var vshader = document.getElementById('vshader').innerHTML;
var fshader = document.getElementById('fshader').innerHTML;
var device = new engine.Device(canvas);
var gl = device.gl;
var renderer = new engine.ForwardRenderer(device);
var scene = new engine.Scene();
var geometry = engine.Geometry.createBox();
var material = new engine.Material();
var mesh = new engine.Mesh(geometry, material);
var camera = new engine.Camera();
var shader = new engine.Shader(device, {
    attributes: {
        aPosition: engine.VertexBuffer.ATTRIBUTE_POSITION,
        aNormal: engine.VertexBuffer.ATTRIBUTE_NORMAL,
    },
    vshader: vshader,
    fshader: fshader
});
material.setShader(shader);
camera.position.set(0, 0, 5);
camera.aspect = window.innerWidth / window.innerHeight;
scene.addChild(mesh);

var euler = new engine.Vec3();
var speed = new engine.Vec3(1, 2, 3);

function render() {
    euler.add(speed);
    mesh.rotate(euler);
    renderer.render(scene, camera);
    window.requestAnimationFrame(render);
}
render();

        </script>
    </body>
</html>
